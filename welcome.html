<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script>if(localStorage.getItem('greens-vm')==='desktop'&&window.self===window.top){document.querySelector('meta[name="viewport"]').content='width=1280,initial-scale='+(screen.width/1280).toFixed(3)+',maximum-scale=5';}</script>
  <title>Welcome to Greens Marriage Mandap</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,700&family=Nunito:wght@300;400;600;700&display=swap" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <style>
    :root {
      --green-deep:  #5a8a5e;
      --green-mid:   #7bae7f;
      --green-light: #c8dfc9;
      --cream:       #fdf6ec;
      --blush:       #f7d4c8;
      --rose:        #e8a598;
      --gold:        #d4a847;
      --gold-light:  #f0d080;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; }

    body {
      font-family: 'Nunito', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 2rem 1rem 2.5rem;
      position: relative;
      overflow: hidden;
      min-height: 100vh;
    }

    /* ── Full-screen cinematic background ── */
    .bg-photo {
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        url('https://images.unsplash.com/photo-1520854221256-17451cc331bf?w=1600&q=85')
        center / cover no-repeat;
      animation: kenBurns 22s ease-in-out infinite alternate;
      will-change: transform;
    }
    @keyframes kenBurns {
      from { transform: scale(1);    filter: brightness(.95); }
      to   { transform: scale(1.09); filter: brightness(1.02); }
    }

    /* ── Layered overlay ── */
    .bg-overlay {
      position: fixed;
      inset: 0;
      z-index: 1;
      background:
        linear-gradient(180deg,
          rgba(14,28,16,.62) 0%,
          rgba(35,60,38,.40) 45%,
          rgba(14,22,16,.72) 100%);
    }
    /* subtle vignette ring */
    .bg-vignette {
      position: fixed;
      inset: 0;
      z-index: 2;
      background: radial-gradient(ellipse at center,
        transparent 38%,
        rgba(8,16,10,.55) 100%);
    }

    /* ── Firefly particles ── */
    .fireflies {
      position: fixed;
      inset: 0;
      z-index: 3;
      pointer-events: none;
    }
    .firefly {
      position: absolute;
      border-radius: 50%;
      background: rgba(212,168,71,.9);
      box-shadow: 0 0 6px 2px rgba(212,168,71,.6);
      animation: fireflyFloat ease-in-out infinite;
    }
    @keyframes fireflyFloat {
      0%   { transform: translate(0, 0) scale(.8); opacity: 0; }
      20%  { opacity: 1; }
      50%  { transform: translate(var(--tx), var(--ty)) scale(1.4); opacity: .85; }
      80%  { opacity: .6; }
      100% { transform: translate(calc(var(--tx)*1.6), calc(var(--ty)*1.8)) scale(.6); opacity: 0; }
    }

    /* ── Petal rain (refined — small circles, not emoji) ── */
    .petals { position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 3; }
    .petal {
      position: absolute;
      top: -20px;
      border-radius: 50% 0 50% 0;
      opacity: 0;
      animation: petalFall linear infinite;
    }
    @keyframes petalFall {
      0%   { transform: translateY(0) rotate(0deg) scale(1); opacity: 0; }
      8%   { opacity: .7; }
      85%  { opacity: .35; }
      100% { transform: translateY(105vh) rotate(420deg) scale(.5); opacity: 0; }
    }

    /* ── Decorative corner lines ── */
    .corner {
      position: fixed;
      z-index: 4;
      width: 80px; height: 80px;
      pointer-events: none;
      opacity: .45;
    }
    .corner::before, .corner::after {
      content: '';
      position: absolute;
      background: var(--gold-light);
      border-radius: 1px;
    }
    .corner-tl { top: 24px; left: 24px; }
    .corner-tl::before { width: 2px; height: 60px; top: 0; left: 0; }
    .corner-tl::after  { width: 60px; height: 2px; top: 0; left: 0; }

    .corner-tr { top: 24px; right: 24px; }
    .corner-tr::before { width: 2px; height: 60px; top: 0; right: 0; }
    .corner-tr::after  { width: 60px; height: 2px; top: 0; right: 0; }

    .corner-bl { bottom: 24px; left: 24px; }
    .corner-bl::before { width: 2px; height: 60px; bottom: 0; left: 0; }
    .corner-bl::after  { width: 60px; height: 2px; bottom: 0; left: 0; }

    .corner-br { bottom: 24px; right: 24px; }
    .corner-br::before { width: 2px; height: 60px; bottom: 0; right: 0; }
    .corner-br::after  { width: 60px; height: 2px; bottom: 0; right: 0; }

    /* ── Main card (glassmorphism) ── */
    .welcome-card {
      position: relative;
      z-index: 5;
      text-align: center;
      padding: 3rem 2.75rem 2.75rem;
      max-width: 560px;
      width: 100%;
      background: rgba(14, 28, 16, .38);
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
      border: 1px solid rgba(200,223,201,.25);
      border-radius: 32px;
      box-shadow:
        0 32px 80px rgba(0,0,0,.45),
        inset 0 1px 0 rgba(255,255,255,.12);
      animation: riseIn 1s cubic-bezier(.4,0,.2,1) .3s both;
    }
    @keyframes riseIn {
      from { opacity: 0; transform: translateY(32px) scale(.97); }
      to   { opacity: 1; transform: translateY(0)    scale(1); }
    }

    .blessing {
      font-family: 'Playfair Display', serif;
      font-size: .9rem;
      font-style: italic;
      color: rgba(200,223,201,.85);
      margin-bottom: 1.5rem;
      letter-spacing: .04em;
      animation: riseIn .7s ease .8s both;
    }

    .logo-mark {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--green-mid) 0%, var(--green-deep) 100%);
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem;
      margin: 0 auto 1.5rem;
      box-shadow:
        0 0 0 6px rgba(123,174,127,.2),
        0 0 0 12px rgba(123,174,127,.08),
        0 12px 36px rgba(0,0,0,.4);
      animation: riseIn .7s ease .6s both;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.2rem, 6vw, 3.6rem);
      font-weight: 700;
      color: #fff;
      line-height: 1.18;
      margin-bottom: .5rem;
      text-shadow: 0 2px 20px rgba(0,0,0,.4);
      animation: riseIn .8s ease .9s both;
    }
    h1 em { font-style: italic; color: var(--gold-light); }

    .subtitle {
      font-size: .93rem;
      color: rgba(255,255,255,.65);
      margin: .6rem 0 2rem;
      letter-spacing: .05em;
      animation: riseIn .7s ease 1.05s both;
    }

    /* gold ornamental divider */
    .divider {
      display: flex; align-items: center; gap: .85rem;
      margin: 0 auto 2rem;
      max-width: 240px;
      animation: riseIn .7s ease 1.15s both;
    }
    .divider-line {
      flex: 1; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(212,168,71,.5), transparent);
    }
    .divider-icon { color: var(--gold); font-size: .9rem; }

    .enter-btn {
      display: inline-flex; align-items: center; gap: .55rem;
      background: linear-gradient(135deg, var(--green-mid) 0%, var(--green-deep) 100%);
      color: #fff;
      border: none; border-radius: 60px;
      padding: 1rem 2.75rem;
      font-family: 'Nunito', sans-serif;
      font-size: .97rem; font-weight: 700;
      cursor: pointer; text-decoration: none;
      box-shadow:
        0 8px 32px rgba(90,138,94,.45),
        0 0 0 1px rgba(200,223,201,.3);
      transition: transform .28s ease, box-shadow .28s ease;
      animation: riseIn .7s ease 1.3s both;
    }
    .enter-btn:hover {
      transform: translateY(-3px) scale(1.04);
      box-shadow: 0 18px 48px rgba(90,138,94,.55), 0 0 0 1px rgba(200,223,201,.4);
    }
    .enter-btn svg {
      width: 17px; height: 17px;
      fill: none; stroke: currentColor;
      stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round;
    }

    .login-link {
      display: inline-flex; align-items: center; gap: .45rem;
      margin-top: 1.1rem;
      color: rgba(200,223,201,.72);
      font-size: .83rem;
      text-decoration: none;
      letter-spacing: .035em;
      transition: color .22s;
      animation: riseIn .7s ease 1.45s both;
    }
    .login-link:hover { color: var(--gold-light); }
    .login-link svg {
      width: 14px; height: 14px;
      fill: none; stroke: currentColor;
      stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round;
      flex-shrink: 0;
    }

    /* ── Co-powered strip ── */
    .copowered {
      position: relative; z-index: 5;
      text-align: center; width: 100%;
      animation: riseIn .7s ease 1.55s both;
    }
    .copowered-label {
      font-size: .68rem; font-weight: 700;
      letter-spacing: .16em; text-transform: uppercase;
      color: rgba(255,255,255,.45);
      margin-bottom: .85rem;
    }
    .partners {
      display: flex; align-items: center; justify-content: center;
      gap: .65rem; flex-wrap: nowrap;
    }
    .partner-pill {
      display: flex; align-items: center; gap: .45rem;
      background: rgba(0,0,0,.35);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 50px;
      padding: .38rem .85rem .38rem .4rem;
      transition: border-color .2s, background .2s;
      flex-shrink: 1; min-width: 0;
    }
    .partner-pill:hover {
      background: rgba(0,0,0,.5);
      border-color: rgba(255,255,255,.28);
    }
    .partner-logo {
      height: 24px; border-radius: 5px; overflow: hidden;
      display: flex; align-items: center; flex-shrink: 0;
    }
    .partner-logo img { height: 24px; width: auto; max-width: 60px; object-fit: contain; display: block; }
    .partner-name { font-size: .78rem; font-weight: 700; color: rgba(255,255,255,.82); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* ── Exit animation ── */
    body.exiting { animation: fadeOut .45s ease forwards; }
    @keyframes fadeOut { to { opacity: 0; transform: scale(.98); } }

    @media (max-width: 480px) {
      body { padding: 1.5rem .875rem 2rem; }
      .welcome-card { padding: 2.25rem 1.75rem; }
      .corner { display: none; }
      .blessing { font-size: .82rem; margin-bottom: 1.25rem; }
      .logo-mark { width: 64px; height: 64px; font-size: 1.7rem; margin-bottom: 1.25rem; }
      .enter-btn { padding: .9rem 2.25rem; font-size: .9rem; }
      .partners { gap: .45rem; }
      .partner-pill { padding: .32rem .7rem .32rem .35rem; gap: .35rem; }
      .partner-logo { height: 20px; }
      .partner-logo img { height: 20px; max-width: 50px; }
      .partner-name { font-size: .72rem; }
      .copowered-label { font-size: .64rem; margin-bottom: .6rem; }
    }
    @media (max-width: 400px) {
      body { padding: 1.25rem .75rem 1.75rem; }
      .welcome-card { padding: 1.75rem 1.25rem; border-radius: 20px; }
      .welcome-card h1 { font-size: 1.9rem; }
      .subtitle { font-size: .85rem; }
      .partners { gap: .35rem; }
      .partner-pill { padding: .28rem .6rem .28rem .3rem; gap: .3rem; }
      .partner-logo { height: 18px; }
      .partner-logo img { height: 18px; max-width: 44px; }
      .partner-name { font-size: .68rem; }
      .copowered-label { font-size: .6rem; }
    }
    @media (prefers-reduced-motion: reduce) {
      .bg-photo { animation: none; }
      .firefly  { animation: none; opacity: .4 !important; }
      .petal    { animation: none; opacity: .3 !important; }
    }
    /* View Mode Toggle */
    .vm-toggle { position:fixed; top:88px; right:20px; z-index:99999; }
    .vm-btn { display:flex; align-items:center; gap:8px; background:rgba(90,138,94,.85); color:#fff; border:1px solid rgba(255,255,255,.2); border-radius:30px; padding:10px 18px 10px 14px; font-size:.8rem; font-weight:700; font-family:'Nunito',sans-serif; cursor:pointer; box-shadow:0 4px 24px rgba(0,0,0,.35); letter-spacing:.02em; white-space:nowrap; backdrop-filter:blur(8px); transition:background .2s, transform .15s; }
    .vm-btn:hover { background:rgba(61,107,64,.9); transform:translateY(-2px); }
    .vm-btn i { font-size:.88rem; }
  </style>
</head>
<body>

  <!-- Cinematic background -->
  <div class="bg-photo"></div>
  <div class="bg-overlay"></div>
  <div class="bg-vignette"></div>

  <!-- Corner decorations -->
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <!-- Fireflies -->
  <div class="fireflies" id="fireflies"></div>

  <!-- Petal rain -->
  <div class="petals" id="petals"></div>

  <!-- Main card -->
  <div class="welcome-card">
    <p class="blessing">ଜୟ ଜଗନ୍ନାଥ &nbsp;·&nbsp; Jai Jagannath</p>
    <div class="logo-mark">🌿</div>
    <h1>Welcome to <em>Greens</em></h1>
    <p class="subtitle">Premium Venue &nbsp;·&nbsp; Bhubaneswar, Odisha</p>
    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-icon">✦</span>
      <div class="divider-line"></div>
    </div>
    <a href="login.html" class="enter-btn" id="loginLink">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
      <span id="loginLinkText">Login to explore the venue</span>
    </a>
  </div>

  <!-- Co-powered strip -->
  <div class="copowered">
    <p class="copowered-label">Co-powered by</p>
    <div class="partners">
      <div class="partner-pill">
        <div class="partner-logo" style="background:#e0e0e0;">
          <img src="logos/indulge-salon.png" alt="Indulge The Salon" />
        </div>
        <span class="partner-name">Indulge The Salon</span>
      </div>
      <div class="partner-pill">
        <div class="partner-logo" style="background:#111;">
          <img src="logos/studio-sinfonia.png" alt="Studio Sinfonia" />
        </div>
        <span class="partner-name">Studio Sinfonia</span>
      </div>
      <div class="partner-pill">
        <div class="partner-logo" style="background:#fff;">
          <img src="logos/weavorah.png" alt="Weavorah" />
        </div>
        <span class="partner-name">Weavorah</span>
      </div>
    </div>
  </div>

  <script>
    // ── Fireflies ──
    const ff = document.getElementById('fireflies');
    const fireflyCount = window.innerWidth < 480 ? 10 : 22;
    for (let i = 0; i < fireflyCount; i++) {
      const el = document.createElement('div');
      el.className = 'firefly';
      const size = 2 + Math.random() * 4;
      el.style.cssText = `
        width:${size}px; height:${size}px;
        left:${Math.random()*100}vw;
        top:${10 + Math.random()*80}vh;
        --tx:${(Math.random()-0.5)*120}px;
        --ty:${-(20 + Math.random()*80)}px;
        animation-duration:${5 + Math.random()*9}s;
        animation-delay:${Math.random()*8}s;
        opacity:0;
      `;
      ff.appendChild(el);
    }

    // ── Petal rain (CSS shapes) ──
    const petalsEl = document.getElementById('petals');
    const colors = [
      'rgba(200,223,201,.55)',
      'rgba(247,212,200,.5)',
      'rgba(212,168,71,.45)',
      'rgba(255,255,255,.35)',
      'rgba(232,165,152,.45)',
    ];
    for (let i = 0; i < 20; i++) {
      const p = document.createElement('div');
      p.className = 'petal';
      const size = 5 + Math.random() * 9;
      p.style.cssText = `
        left:${Math.random()*100}vw;
        width:${size}px; height:${size}px;
        background:${colors[Math.floor(Math.random()*colors.length)]};
        animation-duration:${9 + Math.random()*12}s;
        animation-delay:${Math.random()*10}s;
      `;
      petalsEl.appendChild(p);
    }

    // ── Supabase session check ──
    const SUPABASE_URL = 'https://avvyqtsmobpgwitwbrnk.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF2dnlxdHNtb2JwZ3dpdHdicm5rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzMTU0NDgsImV4cCI6MjA5MTg5MTQ0OH0.34hCOsOesI9cbAraH2mNxDu-q6m3PcTyxVTixuYxfU0';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    (async function() {
      const { data: { session } } = await sb.auth.getSession();
      const loginLink = document.getElementById('loginLink');
      const loginText = document.getElementById('loginLinkText');

      if (session && session.user) {
        const meta = session.user.user_metadata;
        const name = meta.full_name || meta.name || session.user.email.split('@')[0];
        // Show greeting and point to index
        loginText.textContent = 'Hello, ' + name + ' — continue to venue';
        loginLink.href = 'index.html';
      }
    })();

    // ── Smooth exit ──
    document.getElementById('loginLink').addEventListener('click', function(e) {
      e.preventDefault();
      const dest = this.href;
      document.body.classList.add('exiting');
      setTimeout(() => { window.location.href = dest; }, 440);
    });
  </script>

<!-- Mobile Preview Overlay -->
<div id="vmOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:999998;align-items:center;justify-content:center;padding:20px;">
  <div style="position:relative;">
    <div style="background:#111;border-radius:44px;padding:14px 14px 22px;box-shadow:0 40px 100px rgba(0,0,0,.8);">
      <div style="width:50px;height:5px;background:#333;border-radius:3px;margin:0 auto 10px;"></div>
      <iframe id="vmFrame" src="" style="width:390px;height:724px;border:none;border-radius:30px;display:block;"></iframe>
    </div>
    <button onclick="greensCloseOverlay()" style="position:absolute;top:-14px;right:-14px;width:34px;height:34px;background:#fff;border:none;border-radius:50%;font-size:.9rem;cursor:pointer;box-shadow:0 2px 12px rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;line-height:1;">&#x2715;</button>
  </div>
</div>
<!-- ── View Mode Toggle ── -->
<div class="vm-toggle">
  <button class="vm-btn" id="vmBtn" onclick="greensToggleView()">
    <i class="fa-solid fa-desktop" id="vmIcon"></i>
    <span id="vmLabel">Desktop View</span>
  </button>
</div>
<script>
  (function(){
    if(window.self!==window.top){document.querySelectorAll('.vm-toggle,[data-iframe-hide]').forEach(function(el){el.style.display='none';});return;}
    var m=localStorage.getItem('greens-vm')||'responsive';
    var isMob=screen.width<768;
    var icon=document.getElementById('vmIcon');
    var lbl=document.getElementById('vmLabel');
    if(isMob){
      if(m==='desktop'){icon.className='fa-solid fa-mobile-screen-button';lbl.textContent='Mobile View';}
      else{icon.className='fa-solid fa-desktop';lbl.textContent='Desktop View';}
    }else{
      icon.className='fa-solid fa-mobile-screen-button';
      lbl.textContent='Mobile Preview';
    }
    window.greensToggleView=function(){
      if(screen.width>=768&&m!=='desktop'){
        var ol=document.getElementById('vmOverlay');
        ol.style.display='flex';
        var fr=document.getElementById('vmFrame');
        if(!fr.getAttribute('data-loaded')){fr.src=location.href;fr.setAttribute('data-loaded','1');}
        icon.className='fa-solid fa-xmark';lbl.textContent='Close Preview';
      }else{
        localStorage.setItem('greens-vm',m==='desktop'?'responsive':'desktop');
        window.location.reload();
      }
    };
    window.greensCloseOverlay=function(){
      document.getElementById('vmOverlay').style.display='none';
      icon.className='fa-solid fa-mobile-screen-button';lbl.textContent='Mobile Preview';
    };
  })();
</script>
</body>
</html>
