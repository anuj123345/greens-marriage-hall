<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Greens Marriage Hall</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Nunito:wght@400;600;700&display=swap" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <style>
    :root {
      --green-deep: #3d6b40; --green-mid: #5a8a5e; --green-light: #c8dfc9;
      --green-pale: #eef5ef; --cream: #fdf6ec; --white: #fff;
      --text-dark: #2d3a2e; --text-muted: #7a7570; --rose: #e07070;
      --blush: #fdecea; --radius: 14px; --shadow: 0 4px 24px rgba(60,100,65,.12);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Nunito', sans-serif; background: var(--cream); color: var(--text-dark); min-height: 100vh; }

    /* ── Login Screen ── */
    #loginScreen {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, var(--green-pale) 0%, var(--cream) 60%, #f0f7f0 100%);
    }
    .login-card {
      background: var(--white); border-radius: 24px; padding: 3rem 2.5rem;
      text-align: center; max-width: 400px; width: 90%;
      box-shadow: 0 12px 48px rgba(60,100,65,.16); border: 1.5px solid var(--green-light);
    }
    .login-logo { font-family: 'Playfair Display', serif; font-size: 1.6rem; color: var(--green-deep); margin-bottom: .25rem; }
    .login-sub { font-size: .85rem; color: var(--text-muted); margin-bottom: 2.5rem; }
    .login-title { font-size: 1.1rem; font-weight: 700; margin-bottom: .4rem; }
    .login-desc { font-size: .88rem; color: var(--text-muted); margin-bottom: 2rem; }
    .form-group-l { display:flex; flex-direction:column; gap:.35rem; margin-bottom:1rem; }
    .form-group-l label { font-size:.75rem; font-weight:700; text-transform:uppercase; letter-spacing:.07em; color:var(--text-muted); }
    .input-wrap { position:relative; }
    .input-wrap i { position:absolute; left:.9rem; top:50%; transform:translateY(-50%); color:var(--text-muted); font-size:.85rem; }
    .form-group-l input { width:100%; padding:.75rem 1rem .75rem 2.4rem; border:1.5px solid var(--green-light); border-radius:12px; font-family:'Nunito',sans-serif; font-size:.93rem; color:var(--text-dark); background:var(--cream); outline:none; transition:.2s; }
    .form-group-l input:focus { border-color:var(--green-mid); background:var(--white); box-shadow:0 0 0 3px rgba(90,138,94,.12); }
    .btn-login { width:100%; padding:.85rem; background:var(--green-mid); color:#fff; border:none; border-radius:30px; font-family:'Nunito',sans-serif; font-size:1rem; font-weight:700; cursor:pointer; transition:.2s; display:flex; align-items:center; justify-content:center; gap:.5rem; margin-top:.25rem; }
    .btn-login:hover { background:var(--green-deep); }
    .btn-login:disabled { opacity:.6; cursor:not-allowed; }
    #loginError { color: var(--rose); font-size: .85rem; margin-top: 1rem; display: none; background:var(--blush); padding:.6rem 1rem; border-radius:10px; }

    /* ── Dashboard ── */
    #dashboard { display: none; }
    .top-bar {
      background: rgba(253,246,236,.97); backdrop-filter: blur(12px);
      border-bottom: 1.5px solid var(--green-light);
      padding: .85rem 2rem; display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }
    .top-bar-brand { font-family: 'Playfair Display', serif; font-size: 1.1rem; color: var(--green-deep); }
    .top-bar-right { display: flex; align-items: center; gap: 1rem; }
    .admin-email { font-size: .82rem; color: var(--text-muted); }
    .btn-sm {
      padding: .45rem 1.1rem; border-radius: 20px; font-family: 'Nunito', sans-serif;
      font-size: .8rem; font-weight: 700; cursor: pointer; border: none; transition: .2s;
    }
    .btn-logout { background: var(--green-pale); color: var(--green-deep); }
    .btn-logout:hover { background: var(--green-light); }

    .main { max-width: 1140px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }

    /* ── Stats ── */
    .stats-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 1rem; margin-bottom: 2rem; }
    .stat-card {
      background: var(--white); border-radius: var(--radius); padding: 1.25rem 1rem;
      text-align: center; border: 1.5px solid var(--green-light); box-shadow: var(--shadow);
    }
    .stat-num { font-family: 'Playfair Display', serif; font-size: 2rem; font-weight: 700; color: var(--green-deep); }
    .stat-label { font-size: .75rem; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: var(--text-muted); margin-top: .1rem; }

    /* ── Filters ── */
    .filters { display: flex; gap: .5rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
    .filter-btn {
      padding: .45rem 1.1rem; border-radius: 20px; font-size: .82rem; font-weight: 700;
      border: 1.5px solid var(--green-light); background: var(--white);
      color: var(--text-muted); cursor: pointer; transition: .2s;
    }
    .filter-btn:hover, .filter-btn.active { background: var(--green-mid); color: #fff; border-color: var(--green-mid); }
    .filter-btn[data-status="new"].active { background: #3b82f6; border-color: #3b82f6; }
    .filter-btn[data-status="contacted"].active { background: #f59e0b; border-color: #f59e0b; }
    .filter-btn[data-status="booked"].active { background: var(--green-deep); border-color: var(--green-deep); }
    .filter-btn[data-status="completed"].active { background: #6b7280; border-color: #6b7280; }
    .filter-btn[data-status="cancelled"].active { background: var(--rose); border-color: var(--rose); }

    /* ── Search ── */
    .toolbar { display: flex; gap: 1rem; align-items: center; margin-bottom: 1.25rem; flex-wrap: wrap; }
    .search-box {
      display: flex; align-items: center; gap: .5rem; background: var(--white);
      border: 1.5px solid var(--green-light); border-radius: 30px;
      padding: .5rem 1rem; flex: 1; min-width: 200px;
    }
    .search-box input {
      border: none; outline: none; font-family: 'Nunito', sans-serif;
      font-size: .9rem; color: var(--text-dark); background: transparent; width: 100%;
    }
    .search-box i { color: var(--text-muted); }
    .count-label { font-size: .85rem; color: var(--text-muted); font-weight: 600; white-space: nowrap; }

    /* ── Table ── */
    .table-wrap { background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; border: 1.5px solid var(--green-light); }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      background: var(--green-pale); padding: .75rem 1rem; text-align: left;
      font-size: .75rem; font-weight: 700; text-transform: uppercase; letter-spacing: .07em;
      color: var(--green-deep); border-bottom: 1.5px solid var(--green-light);
    }
    tbody tr { border-bottom: 1px solid #f0ede8; transition: background .15s; cursor: pointer; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--green-pale); }
    tbody td { padding: .85rem 1rem; font-size: .875rem; vertical-align: middle; }
    .td-name { font-weight: 700; color: var(--text-dark); }
    .td-phone { color: var(--text-muted); font-size: .82rem; }
    .td-date { font-size: .82rem; color: var(--text-muted); }

    .source-badge {
      display: inline-block; padding: .2rem .65rem; border-radius: 12px;
      font-size: .7rem; font-weight: 700; text-transform: uppercase; letter-spacing: .06em;
    }
    .src-general { background: var(--green-pale); color: var(--green-deep); }
    .src-indulge { background: #fdf0ed; color: #c97b6e; }
    .src-sinfonia { background: #eef4fb; color: #3b7abf; }
    .src-weavorah { background: #f5f0fb; color: #7a5abf; }

    .status-badge {
      display: inline-flex; align-items: center; gap: .3rem;
      padding: .25rem .75rem; border-radius: 12px; font-size: .75rem; font-weight: 700;
    }
    .st-new { background: #dbeafe; color: #1d4ed8; }
    .st-contacted { background: #fef3c7; color: #b45309; }
    .st-booked { background: var(--green-pale); color: var(--green-deep); }
    .st-completed { background: #f3f4f6; color: #4b5563; }
    .st-cancelled { background: var(--blush); color: var(--rose); }

    .empty-state {
      text-align: center; padding: 4rem 2rem; color: var(--text-muted);
    }
    .empty-state i { font-size: 2.5rem; margin-bottom: 1rem; opacity: .4; }

    /* ── Detail Drawer ── */
    .overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 200;
      display: none; align-items: flex-end; justify-content: flex-end;
    }
    .overlay.open { display: flex; }
    .drawer {
      background: var(--white); width: min(520px, 100vw); height: 100vh;
      overflow-y: auto; padding: 2rem; box-shadow: -8px 0 40px rgba(0,0,0,.15);
      animation: slideIn .25s ease;
    }
    @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
    .drawer-close {
      float: right; background: var(--green-pale); border: none; width: 34px; height: 34px;
      border-radius: 50%; cursor: pointer; font-size: 1rem; color: var(--green-deep);
      display: flex; align-items: center; justify-content: center;
    }
    .drawer h3 { font-family: 'Playfair Display', serif; font-size: 1.3rem; margin-bottom: .25rem; }
    .drawer-meta { font-size: .82rem; color: var(--text-muted); margin-bottom: 1.5rem; }
    .detail-row { display: flex; gap: .5rem; margin-bottom: .75rem; font-size: .88rem; }
    .detail-row strong { min-width: 110px; color: var(--text-muted); font-weight: 700; flex-shrink: 0; }
    .divider { border: none; border-top: 1px solid #f0ede8; margin: 1.5rem 0; }

    .form-group { display: flex; flex-direction: column; gap: .4rem; margin-bottom: 1rem; }
    .form-group label { font-size: .78rem; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: var(--text-muted); }
    .form-group select, .form-group textarea {
      padding: .65rem .9rem; border: 1.5px solid var(--green-light); border-radius: 10px;
      font-family: 'Nunito', sans-serif; font-size: .9rem; color: var(--text-dark);
      background: var(--cream); outline: none; transition: border-color .2s;
    }
    .form-group select:focus, .form-group textarea:focus { border-color: var(--green-mid); background: var(--white); }
    .form-group textarea { resize: vertical; min-height: 80px; }
    .btn-save {
      width: 100%; padding: .8rem; background: var(--green-mid); color: #fff;
      border: none; border-radius: 30px; font-family: 'Nunito', sans-serif;
      font-size: .95rem; font-weight: 700; cursor: pointer; transition: background .2s, transform .15s;
      display: flex; align-items: center; justify-content: center; gap: .5rem;
    }
    .btn-save:hover { background: var(--green-deep); transform: translateY(-1px); }
    .save-msg { text-align: center; font-size: .82rem; color: var(--green-mid); margin-top: .5rem; height: 1.2em; }

    /* Responsive */
    @media (max-width: 900px) {
      .stats-row { grid-template-columns: repeat(3, 1fr); }
    }
    @media (max-width: 600px) {
      .main { padding: 1rem 1rem 3rem; }
      .stats-row { grid-template-columns: repeat(2, 1fr); }
      .top-bar { padding: .75rem 1rem; }
      .admin-email { display: none; }
      thead th:nth-child(4), thead th:nth-child(5), tbody td:nth-child(4), tbody td:nth-child(5) { display: none; }
    }
  </style>
</head>
<body>

<!-- ── Login Screen ── -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo">🌿 Greens</div>
    <div class="login-sub">Marriage Hall · Admin Portal</div>
    <div class="login-title">Admin Login</div>
    <div class="login-desc">Sign in with your admin email and password.</div>
    <form onsubmit="doAdminLogin(event)">
      <div class="form-group-l">
        <label>Email</label>
        <div class="input-wrap">
          <i class="fa-solid fa-envelope"></i>
          <input type="email" id="a-email" placeholder="admin@email.com" required autocomplete="email" />
        </div>
      </div>
      <div class="form-group-l">
        <label>Password</label>
        <div class="input-wrap">
          <i class="fa-solid fa-lock"></i>
          <input type="password" id="a-password" placeholder="Your password" required autocomplete="current-password" />
        </div>
      </div>
      <button type="submit" class="btn-login" id="loginBtn">
        <i class="fa-solid fa-right-to-bracket"></i> Login
      </button>
    </form>
    <div id="loginError"></div>
  </div>
</div>

<!-- ── Dashboard ── -->
<div id="dashboard">
  <header class="top-bar">
    <div class="top-bar-brand">🌿 Greens Admin</div>
    <div class="top-bar-right">
      <span class="admin-email" id="adminEmail"></span>
      <button class="btn-sm btn-logout" onclick="signOut()"><i class="fa-solid fa-right-from-bracket"></i> Sign Out</button>
    </div>
  </header>

  <div class="main">
    <!-- Stats -->
    <div class="stats-row" id="statsRow">
      <div class="stat-card"><div class="stat-num" id="st-total">—</div><div class="stat-label">Total</div></div>
      <div class="stat-card"><div class="stat-num" id="st-new" style="color:#1d4ed8">—</div><div class="stat-label">New</div></div>
      <div class="stat-card"><div class="stat-num" id="st-contacted" style="color:#b45309">—</div><div class="stat-label">Contacted</div></div>
      <div class="stat-card"><div class="stat-num" id="st-booked" style="color:var(--green-deep)">—</div><div class="stat-label">Booked</div></div>
      <div class="stat-card"><div class="stat-num" id="st-completed" style="color:#4b5563">—</div><div class="stat-label">Completed</div></div>
    </div>

    <!-- Filters -->
    <div class="filters">
      <button class="filter-btn active" data-status="all" onclick="setFilter('all',this)">All</button>
      <button class="filter-btn" data-status="new" onclick="setFilter('new',this)">🔵 New</button>
      <button class="filter-btn" data-status="contacted" onclick="setFilter('contacted',this)">🟡 Contacted</button>
      <button class="filter-btn" data-status="booked" onclick="setFilter('booked',this)">🟢 Booked</button>
      <button class="filter-btn" data-status="completed" onclick="setFilter('completed',this)">⚫ Completed</button>
      <button class="filter-btn" data-status="cancelled" onclick="setFilter('cancelled',this)">🔴 Cancelled</button>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
      <div class="search-box">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" id="searchInput" placeholder="Search by name, phone, email…" oninput="renderTable()" />
      </div>
      <span class="count-label" id="countLabel"></span>
    </div>

    <!-- Table -->
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Contact</th>
            <th>Source</th>
            <th>Event</th>
            <th>Date</th>
            <th>Status</th>
            <th>Received</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- ── Detail Drawer ── -->
<div class="overlay" id="overlay" onclick="closeDrawer(event)">
  <div class="drawer" id="drawer">
    <button class="drawer-close" onclick="closeDrawer()"><i class="fa-solid fa-xmark"></i></button>
    <h3 id="dr-name"></h3>
    <div class="drawer-meta" id="dr-meta"></div>

    <div id="dr-details"></div>
    <hr class="divider" />

    <div class="form-group">
      <label>Status</label>
      <select id="dr-status">
        <option value="new">🔵 New</option>
        <option value="contacted">🟡 Contacted</option>
        <option value="booked">🟢 Booked</option>
        <option value="completed">⚫ Completed</option>
        <option value="cancelled">🔴 Cancelled</option>
      </select>
    </div>
    <div class="form-group">
      <label>Admin Notes</label>
      <textarea id="dr-notes" placeholder="Add internal notes — follow-up details, booking info, etc."></textarea>
    </div>
    <button class="btn-save" onclick="saveDrawer()"><i class="fa-solid fa-floppy-disk"></i> Save Changes</button>
    <div class="save-msg" id="saveMsg"></div>
  </div>
</div>

<script>
  const SUPABASE_URL  = 'https://avvyqtsmobpgwitwbrnk.supabase.co';
  const SUPABASE_KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF2dnlxdHNtb2JwZ3dpdHdicm5rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzMTU0NDgsImV4cCI6MjA5MTg5MTQ0OH0.34hCOsOesI9cbAraH2mNxDu-q6m3PcTyxVTixuYxfU0';
  const ADMIN_EMAIL   = 'ritesh.jena80@gmail.com';

  const _sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  let allEnquiries = [];
  let currentFilter = 'all';
  let currentId = null;

  // ── Auth ──
  async function init() {
    const { data: { session } } = await _sb.auth.getSession();
    if (session && isAdmin(session.user)) {
      showDashboard(session.user);
    } else {
      if (session) await _sb.auth.signOut();
      window.location.href = 'login.html?portal=admin';
    }
  }

  function isAdmin(user) {
    return user.email.toLowerCase() === ADMIN_EMAIL.toLowerCase();
  }

  async function doAdminLogin(e) {
    e.preventDefault();
    const btn = document.getElementById('loginBtn');
    const errEl = document.getElementById('loginError');
    btn.disabled = true;
    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Logging in…';
    errEl.style.display = 'none';

    const email    = document.getElementById('a-email').value.trim();
    const password = document.getElementById('a-password').value;

    if (!isAdmin({ email })) {
      errEl.textContent = 'Access denied. This portal is for admins only.';
      errEl.style.display = 'block';
      btn.disabled = false;
      btn.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> Login';
      return;
    }

    const { data, error } = await _sb.auth.signInWithPassword({ email, password });
    if (error) {
      errEl.textContent = error.message;
      errEl.style.display = 'block';
      btn.disabled = false;
      btn.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> Login';
      return;
    }
    showDashboard(data.user);
  }

  async function signOut() {
    await _sb.auth.signOut();
    window.location.reload();
  }

  // ── Dashboard ──
  async function showDashboard(user) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    document.getElementById('adminEmail').textContent = user.email;
    await loadEnquiries();
  }

  async function loadEnquiries() {
    const { data, error } = await _sb.from('enquiries')
      .select('*').order('created_at', { ascending: false });
    if (error) { console.error(error); return; }
    allEnquiries = data || [];
    updateStats();
    renderTable();
  }

  function updateStats() {
    document.getElementById('st-total').textContent     = allEnquiries.length;
    document.getElementById('st-new').textContent       = allEnquiries.filter(e => e.status === 'new').length;
    document.getElementById('st-contacted').textContent = allEnquiries.filter(e => e.status === 'contacted').length;
    document.getElementById('st-booked').textContent    = allEnquiries.filter(e => e.status === 'booked').length;
    document.getElementById('st-completed').textContent = allEnquiries.filter(e => e.status === 'completed').length;
  }

  function setFilter(status, btn) {
    currentFilter = status;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderTable();
  }

  function renderTable() {
    const search = (document.getElementById('searchInput').value || '').toLowerCase();
    let rows = allEnquiries;

    if (currentFilter !== 'all') rows = rows.filter(e => e.status === currentFilter);
    if (search) rows = rows.filter(e =>
      (e.name || '').toLowerCase().includes(search) ||
      (e.phone || '').includes(search) ||
      (e.email || '').toLowerCase().includes(search)
    );

    document.getElementById('countLabel').textContent = `${rows.length} enquir${rows.length === 1 ? 'y' : 'ies'}`;

    const tbody = document.getElementById('tableBody');
    if (!rows.length) {
      tbody.innerHTML = `<tr><td colspan="7"><div class="empty-state"><i class="fa-solid fa-inbox"></i><br>No enquiries found</div></td></tr>`;
      return;
    }
    tbody.innerHTML = rows.map(e => `
      <tr onclick="openDrawer('${e.id}')">
        <td>
          <div class="td-name">${esc(e.name || '—')}</div>
          ${e.email ? `<div class="td-phone">${esc(e.email)}</div>` : ''}
        </td>
        <td><div class="td-phone">${esc(e.phone || '—')}</div></td>
        <td><span class="source-badge src-${esc(e.source || 'general')}">${esc(e.source || 'general')}</span></td>
        <td class="td-date">${esc(e.event_type || '—')}</td>
        <td class="td-date">${e.event_date ? fmtDate(e.event_date) : '—'}</td>
        <td><span class="status-badge st-${esc(e.status || 'new')}">${statusLabel(e.status)}</span></td>
        <td class="td-date">${fmtDateTime(e.created_at)}</td>
      </tr>`).join('');
  }

  // ── Drawer ──
  function openDrawer(id) {
    const e = allEnquiries.find(x => x.id === id);
    if (!e) return;
    currentId = id;

    document.getElementById('dr-name').textContent = e.name || 'Unknown';
    document.getElementById('dr-meta').textContent = `Received ${fmtDateTime(e.created_at)} · Source: ${e.source || 'general'}`;

    const details = [
      ['Phone',       e.phone],
      ['Email',       e.email],
      ['Event Type',  e.event_type],
      ['Event Date',  e.event_date ? fmtDate(e.event_date) : null],
      ['Guests',      e.guest_count],
      ['Message',     e.message],
    ].filter(([,v]) => v).map(([k,v]) => `
      <div class="detail-row"><strong>${k}</strong><span>${esc(String(v))}</span></div>`).join('');
    document.getElementById('dr-details').innerHTML = details;

    document.getElementById('dr-status').value = e.status || 'new';
    document.getElementById('dr-notes').value = e.admin_notes || '';
    document.getElementById('saveMsg').textContent = '';

    document.getElementById('overlay').classList.add('open');
  }

  function closeDrawer(e) {
    if (e && e.target !== document.getElementById('overlay')) return;
    document.getElementById('overlay').classList.remove('open');
    currentId = null;
  }

  async function saveDrawer() {
    if (!currentId) return;
    const status = document.getElementById('dr-status').value;
    const notes  = document.getElementById('dr-notes').value;
    const btn = document.querySelector('.btn-save');
    btn.disabled = true; btn.textContent = 'Saving…';

    const { error } = await _sb.from('enquiries')
      .update({ status, admin_notes: notes }).eq('id', currentId);

    btn.disabled = false;
    btn.innerHTML = '<i class="fa-solid fa-floppy-disk"></i> Save Changes';
    if (error) {
      document.getElementById('saveMsg').style.color = '#e07070';
      document.getElementById('saveMsg').textContent = 'Error saving. Try again.';
    } else {
      document.getElementById('saveMsg').style.color = 'var(--green-mid)';
      document.getElementById('saveMsg').textContent = '✓ Saved!';
      const idx = allEnquiries.findIndex(x => x.id === currentId);
      if (idx !== -1) { allEnquiries[idx].status = status; allEnquiries[idx].admin_notes = notes; }
      updateStats();
      renderTable();
    }
  }

  // ── Helpers ──
  function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  function fmtDate(d) { return new Date(d + 'T00:00:00').toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' }); }
  function fmtDateTime(d) { return new Date(d).toLocaleString('en-IN', { day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' }); }
  function statusLabel(s) {
    return { new:'New', contacted:'Contacted', booked:'Booked', completed:'Completed', cancelled:'Cancelled' }[s] || s;
  }

  // Keyboard close
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDrawer(); });

  init();
</script>
</body>
</html>
